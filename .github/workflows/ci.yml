name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard against focused tests (.only)
        run: pnpm run check:no-only

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (also typechecks via tsc)
        run: pnpm run build

      # CI=true is set by GitHub Actions, so the web-test-runner config falls
      # back to Playwright's bundled Chromium instead of the local dev binary.
      - name: Test (unit + browser)
        run: pnpm run test:ci
